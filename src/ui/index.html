<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>claude-plan-api · audit</title>
    <script>
      // Zero-FOUC theme: read localStorage + OS preference BEFORE React hydrates
      // and apply the class on <html> so the first paint is the right theme.
      // ThemeProvider takes over after hydration.
      (function () {
        try {
          const stored = localStorage.getItem("theme");
          const system = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          const resolved = stored === "dark" || stored === "light" ? stored : system;
          document.documentElement.classList.add(resolved);
        } catch (_) {
          // localStorage unavailable — fall back to light, ThemeProvider will reconcile
        }
      })();
    </script>
  </head>
  <body class="bg-background text-foreground min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
